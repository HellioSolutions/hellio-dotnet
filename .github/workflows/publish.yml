name: publish

# Publishes Hellio.Messaging to NuGet when a version tag (v*) is pushed.
# Set the NUGET_API_KEY repository secret first:
#   Settings -> Secrets and variables -> Actions -> New repository secret
#   Name: NUGET_API_KEY   Value: your nuget.org API key
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore
        run: dotnet restore

      - name: Test
        run: dotnet test --configuration Release

      - name: Pack
        run: dotnet pack src/Hellio.Messaging/Hellio.Messaging.csproj --configuration Release --output ./artifacts

      - name: Push to NuGet
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
